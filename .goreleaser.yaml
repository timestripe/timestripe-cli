version: 2

project_name: timestripe

before:
  hooks:
    - go mod tidy

builds:
  - id: timestripe
    main: ./cmd/timestripe
    binary: timestripe
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/timestripe/timestripe-cli/internal/cli.version={{ .Version }}
      - -X github.com/timestripe/timestripe-cli/internal/cli.commit={{ .ShortCommit }}
      - -X github.com/timestripe/timestripe-cli/internal/cli.date={{ .Date }}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files:
      - LICENSE*
      - README*

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: timestripe
    name: timestripe-cli
  draft: false
  prerelease: auto

brews:
  - name: timestripe-cli
    repository:
      owner: timestripe
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/timestripe/timestripe-cli
    description: Command-line interface for Timestripe.
    license: MIT
    commit_author:
      name: timestripe-bot
      email: bot@timestripe.com
    commit_msg_template: "brew: bump {{ .ProjectName }} to {{ .Tag }}"
    install: |
      bin.install "timestripe"
      generate_completions_from_executable(bin/"timestripe", "completion")
    test: |
      assert_match version.to_s, shell_output("#{bin}/timestripe --version")
