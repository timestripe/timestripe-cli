  /goals/{id}/attachments/:
    post:
      operationId: goalsAttachmentsCreate
      description: Uploaded file is appended to the goal’s description as an inline
        image or link.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Goals
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      security:
      - API Key: []
      - OAuth2: []
      responses:
        '201':
          description: Created
