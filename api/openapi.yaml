components:
  schemas:
    Board:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        spaceId:
          type: string
        name:
          type: string
          maxLength: 250
        description:
          type: string
        background:
          type: string
          nullable: true
          maxLength: 250
        layout:
          type: string
          nullable: true
          maxLength: 250
        sequenceNo:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        archived:
          type: boolean
        createdDatetime:
          type: string
          format: date-time
          readOnly: true
        url:
          type: string
          readOnly: true
      required:
      - createdDatetime
      - id
      - spaceId
      - url
    Bucket:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        boardId:
          type: string
        name:
          type: string
          maxLength: 250
        emoji:
          type: string
          maxLength: 10
        showEmoji:
          type: boolean
        expanded:
          type: boolean
        sequenceNo:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        createdDatetime:
          type: string
          format: date-time
          readOnly: true
        url:
          type: string
          readOnly: true
      required:
      - boardId
      - createdDatetime
      - id
      - url
    Goal:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        spaceId:
          type: string
        bucketId:
          type: string
          nullable: true
        parentId:
          type: string
          nullable: true
        assigneeId:
          type: string
          nullable: true
        horizon:
          enum:
          - day
          - week
          - month
          - quarter
          - year
          - decade
          - life
          - null
          type: string
          description: |-
            * `day` - day
            * `week` - week
            * `month` - month
            * `quarter` - quarter
            * `year` - year
            * `decade` - decade
            * `life` - life
          x-spec-enum-id: 13429041ce24120c
          nullable: true
        date:
          type: string
          format: date
          nullable: true
        startTime:
          type: string
          format: time
          nullable: true
        endTime:
          type: string
          format: time
          nullable: true
        name:
          type: string
          maxLength: 250
        description:
          type: string
        color:
          enum:
          - '#ecce32'
          - '#df496d'
          - '#92ce14'
          - '#278dea'
          - '#955be0'
          - '#f2713a'
          - null
          type: string
          description: |-
            * `#ecce32` - #ecce32
            * `#df496d` - #df496d
            * `#92ce14` - #92ce14
            * `#278dea` - #278dea
            * `#955be0` - #955be0
            * `#f2713a` - #f2713a
          x-spec-enum-id: bf9322e458ef9c42
          nullable: true
        checked:
          type: boolean
        createdDatetime:
          type: string
          format: date-time
