openapi: 3.0.3
info:
  title: Timestripe API
  version: v3
  description: "\nTimestripe is a unique planner with flexible time frames that allows\
    \ you to think strategically,\nhave a clear vision, and focus on things that are\
    \ really important to you.\n\nYou can manage API keys in [Settings](/settings/#api-keys).\n\
    \nTo register an OAuth Client, contact us: help@timestripe.com\n\n[Open Timestripe\
    \ →](/)\n\n[Get Timestripe CLI →](https://github.com/timestripe/timestripe-cli)\n\
    \    "
paths:
  /boards/:
    get:
      operationId: boardsList
      parameters:
      - name: archived
        in: query
        required: false
        description: Filter by archived. Accepts `true` or `false`.
        schema:
          type: boolean
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: search
        in: query
        required: false
        description: 'Case-insensitive token search over: name.'
        schema:
          type: string
      - name: sort
        in: query
        required: false
        description: Sort order. Prefix with `-` for descending (e.g. `-createdDatetime`).
        schema:
          type: string
          enum:
          - archived
          - name
          - sequenceNo
          - -archived
          - -name
          - -sequenceNo
      - name: spaceId
        in: query
        required: false
        description: Filter by space code.
        schema:
          type: string
      tags:
      - Boards
      security:
      - API Key: []
      - OAuth2: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBoardList'
          description: ''
    post:
      operationId: boardsCreate
      tags:
      - Boards
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Board'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Board'
          application/json:
            schema:
              $ref: '#/components/schemas/Board'
        required: true
      security:
      - API Key: []
      - OAuth2: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
          description: ''
  /boards/{id}/:
    get:
      operationId: boardsRetrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Boards
      security:
      - API Key: []
      - OAuth2: []
      responses:
        '200':
