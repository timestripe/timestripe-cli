          - GOAL_DELETED
          - GOAL_DONE
          - GOAL_MODIFIED
          - GOAL_RESCHEDULED
          - MEMBERSHIP_CREATED
          - MEMBERSHIP_DELETED
          - MENTION_CREATED
          - SPACE_CREATED
          - SPACE_CREATED_BY_CLONING
          - SPACE_USED_FOR_CLONING
          - USER_CREATED
      - name: userId
