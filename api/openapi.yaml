  /goals/:
    get:
      operationId: goalsList
      parameters:
      - name: assigneeId
        in: query
        required: false
        description: Filter by assignee code. Pass `null` to match items where this
          field is unset.
        schema:
          type: string
      - name: bucketId
        in: query
        required: false
        description: Filter by bucket code. Pass `null` to match items where this
          field is unset.
        schema:
          type: string
      - name: checked
        in: query
        required: false
        description: Accepts `true` or `false`.
        schema:
          type: boolean
      - name: color
        in: query
        required: false
        description: Filter by color.
        schema:
          type: string
          enum:
          - '#278dea'
          - '#92ce14'
          - '#955be0'
          - '#df496d'
          - '#ecce32'
          - '#f2713a'
      - name: date_from
        in: query
        required: false
        description: Inclusive lower bound (>=) on due_date. ISO 8601 date (YYYY-MM-DD).
        schema:
          type: string
          format: date
      - name: date_to
        in: query
        required: false
        description: Inclusive upper bound (<=) on due_date. ISO 8601 date (YYYY-MM-DD).
        schema:
          type: string
          format: date
      - name: horizon
        in: query
        required: false
        description: Repeat the parameter for OR semantics (e.g. `?horizon=day&horizon=year`).
        schema:
          type: array
          items:
            type: string
            enum:
            - day
            - decade
            - life
            - month
            - quarter
            - week
            - year
        style: form
        explode: true
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: parentId
        in: query
        required: false
        description: Filter by parent code. Pass `null` to match items where this
          field is unset.
        schema:
          type: string
      - name: search
        in: query
        required: false
        description: Search query.
        schema:
          type: string
      - name: sort
        in: query
        required: false
        description: Sort order. Prefix with `-` for descending (e.g. `-createdDatetime`).
        schema:
          type: string
          enum:
          - assignee
          - checked
          - createdDatetime
          - date
          - horizon
          - modifiedDatetime
          - name
          - -assignee
          - -checked
          - -createdDatetime
          - -date
          - -horizon
          - -modifiedDatetime
          - -name
      - name: spaceId
        in: query
        required: false
        description: Filter by space code.
        schema:
          type: string
      - name: updated_since
        in: query
        required: false
        description: Inclusive lower bound (>=) on modified_datetime. ISO 8601 datetime.
        schema:
          type: string
          format: date-time
      tags:
      - Goals
      security:
      - API Key: []
      - OAuth2: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedGoalList'
          description: ''
    post:
      operationId: goalsCreate
      tags:
      - Goals
      requestBody:
        content:
