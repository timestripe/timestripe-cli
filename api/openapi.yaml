components:
  schemas:
    Board:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        spaceId:
          type: string
        name:
          type: string
          maxLength: 250
        description:
          type: string
          description: Markdown-formatted text.
        background:
          type: string
          nullable: true
          maxLength: 250
        layout:
          enum:
          - horizontal
          - vertical
          - null
          type: string
          description: |-
            * `horizontal` - horizontal
            * `vertical` - vertical
          x-spec-enum-id: dcb38317a1dd75c9
          nullable: true
        sequenceNo:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        archived:
          type: boolean
        createdDatetime:
          type: string
          format: date-time
          readOnly: true
        url:
          type: string
          readOnly: true
      required:
      - createdDatetime
      - id
      - spaceId
      - url
    Bucket:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        boardId:
          type: string
        name:
          type: string
          maxLength: 250
        emoji:
          type: string
          maxLength: 10
        showEmoji:
          type: boolean
        expanded:
          type: boolean
        sequenceNo:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        createdDatetime:
          type: string
          format: date-time
          readOnly: true
        url:
          type: string
          readOnly: true
      required:
      - boardId
      - createdDatetime
      - id
      - url
    Goal:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        spaceId:
          type: string
        bucketId:
          type: string
          nullable: true
        parentId:
          type: string
          nullable: true
        assigneeId:
          type: string
          nullable: true
        horizon:
          enum:
          - day
          - week
          - month
          - quarter
          - year
          - decade
          - life
          - null
          type: string
          description: |-
            * `day` - day
            * `week` - week
            * `month` - month
            * `quarter` - quarter
            * `year` - year
            * `decade` - decade
            * `life` - life
          x-spec-enum-id: 13429041ce24120c
          nullable: true
        date:
          type: string
          format: date
          nullable: true
          description: ISO 8601 date (YYYY-MM-DD).
        startTime:
          type: string
          format: time
          nullable: true
          description: Time in 24-hour HH:MM format.
        endTime:
          type: string
          format: time
          nullable: true
          description: Time in 24-hour HH:MM format.
        name:
          type: string
          maxLength: 250
        description:
          type: string
          description: Markdown-formatted text.
        color:
          enum:
          - '#ecce32'
          - '#df496d'
          - '#92ce14'
          - '#278dea'
          - '#955be0'
          - '#f2713a'
